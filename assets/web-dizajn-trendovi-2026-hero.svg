<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="1600" height="900" fill="#FFC93C"/>

  <!-- soft doodle scribbles background -->
  <g stroke="#171412" stroke-opacity="0.12" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M60 60 q40 -30 80 0 t80 0"/>
    <path d="M1440 780 q40 -30 80 0 t80 30"/>
    <circle cx="1500" cy="140" r="4" fill="#171412" fill-opacity="0.15" stroke="none"/>
    <circle cx="1470" cy="180" r="3" fill="#171412" fill-opacity="0.15" stroke="none"/>
  </g>

  <!-- stars -->
  <g fill="#171412" fill-opacity="0.85">
    <path d="M120 130 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
    <path d="M1500 660 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5 z"/>
    <path d="M1380 110 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
  </g>

  <!-- speech bubble top right -->
  <g transform="translate(1290,150)">
    <path d="M0 40 q0 -40 40 -40 h140 q40 0 40 40 v40 q0 40 -40 40 h-100 l-30 26 4 -26 h-14 q-40 0 -40 -40 z"
          fill="#FFFFFF" stroke="#171412" stroke-width="4" stroke-linejoin="round"/>
    <text x="70" y="65" font-size="30" font-weight="800" fill="#171412">2026</text>
  </g>

  <!-- laptop with wireframe mockup, center-left -->
  <g transform="translate(230,300)">
    <!-- laptop base -->
    <path d="M-40 430 L840 430 L800 460 L-10 460 Z" fill="#171412"/>
    <rect x="-10" y="410" width="820" height="24" rx="6" fill="#2a2521"/>
    <!-- screen -->
    <rect x="20" y="0" width="760" height="420" rx="18" fill="#171412"/>
    <rect x="42" y="22" width="716" height="376" rx="8" fill="#FFFFFF"/>

    <!-- browser chrome dots -->
    <circle cx="66" cy="46" r="6" fill="#FF6B6B"/>
    <circle cx="88" cy="46" r="6" fill="#FFD048"/>
    <circle cx="110" cy="46" r="6" fill="#4CAF50"/>
    <rect x="140" y="38" width="300" height="16" rx="8" fill="#F1EFEC"/>

    <!-- wireframe hero mock inside screen: nav bar -->
    <rect x="66" y="76" width="668" height="34" rx="6" fill="#FFF3CF"/>
    <rect x="86" y="88" width="50" height="10" rx="3" fill="#171412" opacity="0.5"/>
    <rect x="620" y="84" width="90" height="18" rx="9" fill="#FFD048"/>

    <!-- hero headline block -->
    <rect x="86" y="140" width="440" height="24" rx="4" fill="#171412" opacity="0.85"/>
    <rect x="86" y="176" width="300" height="24" rx="4" fill="#171412" opacity="0.85"/>
    <rect x="86" y="222" width="360" height="12" rx="4" fill="#171412" opacity="0.35"/>
    <rect x="86" y="242" width="280" height="12" rx="4" fill="#171412" opacity="0.35"/>

    <!-- CTA button -->
    <rect x="86" y="272" width="150" height="40" rx="20" fill="#FFD048" stroke="#171412" stroke-width="3"/>
    <text x="115" y="298" font-size="16" font-weight="700" fill="#171412">Klikni tu</text>

    <!-- trending-up chart on right instead of static image grid -->
    <rect x="470" y="140" width="264" height="200" rx="10" fill="#FFF3CF" stroke="#171412" stroke-width="3" stroke-dasharray="6 6"/>
    <path d="M490 300 l60 -40 40 20 60 -90 104 60" fill="none" stroke="#171412" stroke-width="4" opacity="0.6"/>
    <path d="M680 250 l16 -10 6 18 z" fill="#171412" opacity="0.6"/>
    <circle cx="520" cy="200" r="10" fill="#171412" opacity="0.25"/>

    <!-- cursor doodle pointing at CTA -->
    <g transform="translate(255,330)">
      <path d="M0 0 L0 34 L8 26 L14 40 L22 36 L16 22 L28 22 Z" fill="#171412"/>
    </g>
  </g>

  <!-- pencil doodle bottom right of laptop -->
  <g transform="translate(1020,560) rotate(-25)">
    <rect x="0" y="0" width="180" height="26" rx="6" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
    <rect x="0" y="0" width="30" height="26" fill="#171412"/>
    <path d="M180 0 L210 13 L180 26 Z" fill="#F4B400" stroke="#171412" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- sticky note with color palette -->
  <g transform="translate(1120,300) rotate(6)">
    <rect x="0" y="0" width="150" height="150" rx="6" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
    <circle cx="40" cy="45" r="16" fill="#FF6B6B" stroke="#171412" stroke-width="3"/>
    <circle cx="90" cy="45" r="16" fill="#4CAF50" stroke="#171412" stroke-width="3"/>
    <circle cx="40" cy="95" r="16" fill="#4A90D9" stroke="#171412" stroke-width="3"/>
    <circle cx="90" cy="95" r="16" fill="#FFD048" stroke="#171412" stroke-width="3"/>
  </g>

  <!-- H1 title text, wrapped -->
  <g>
    <text x="800" y="750" text-anchor="middle" font-size="46" font-weight="800" fill="#171412" letter-spacing="-1">
      <tspan x="800" dy="0">Web dizajn trendovi 2026: što stvarno</tspan>
      <tspan x="800" dy="56">podiže konverzije (a što je hype)</tspan>
    </text>
  </g>

  <!-- small icon labels row -->
  <g font-size="20" font-weight="700" fill="#171412">
    <g transform="translate(120,830)">
      <rect x="0" y="-22" width="26" height="26" rx="6" fill="#171412"/>
      <text x="34" y="-2">Pokret</text>
    </g>
    <g transform="translate(330,830)">
      <circle cx="12" cy="-9" r="13" fill="none" stroke="#171412" stroke-width="4"/>
      <text x="34" y="-2">AI</text>
    </g>
    <g transform="translate(460,830)">
      <rect x="0" y="-22" width="26" height="26" rx="13" fill="none" stroke="#171412" stroke-width="4"/>
      <text x="34" y="-2">Tipografija</text>
    </g>
    <g transform="translate(690,830)">
      <path d="M0 -2 L13 -22 L26 -2 Z" fill="none" stroke="#171412" stroke-width="4" stroke-linejoin="round"/>
      <text x="34" y="-2">Pristupačnost</text>
    </g>
  </g>

  <!-- Kuzis wordmark bottom left -->
  <text x="50" y="850" font-size="34" font-weight="800" fill="#171412">Kužiš.</text>
</svg>
