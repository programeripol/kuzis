<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif" role="img" aria-label="Ilustracija: Canva skociprozor Promjene spremljene s gumbom Ucini dostupnim offline nakon klika na oblak ikonu">
  <rect x="0" y="0" width="700" height="420" rx="14" fill="#EDEDED"/>
  <rect x="0.75" y="0.75" width="698.5" height="418.5" rx="13.25" fill="none" stroke="rgba(23,18,15,0.1)" stroke-width="1.5"/>

  <!-- canvas background hint -->
  <defs>
    <linearGradient id="canvasGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CFEFE0"/>
      <stop offset="1" stop-color="#BFE3F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="64" width="700" height="356" fill="url(#canvasGrad)" opacity="0.55"/>

  <!-- top bar -->
  <rect x="0" y="0" width="700" height="64" rx="14" fill="#FFFFFF"/>
  <rect x="0" y="50" width="700" height="14" fill="#FFFFFF"/>
  <rect x="0" y="63" width="700" height="1" fill="rgba(23,18,15,0.08)"/>

  <path d="M28 22 l14 14 M42 22 l-14 14" stroke="#171412" stroke-width="0" />
  <path d="M22 40 l4 -14 l14 -4 l-4 14 z" fill="none" stroke="#171412" stroke-width="1.6" stroke-linejoin="round"/>
  <text x="56" y="37" fill="#171412" font-size="14.5" font-weight="700">Uređivanje</text>
  <path d="M150 30 l5 6 l5 -6" fill="none" stroke="#171412" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(196,20)" stroke="#B7B0A8" stroke-width="1.7" fill="none">
    <path d="M14 3 a11 11 0 1 0 0.5 0" stroke-dasharray="1 40"/>
    <path d="M2 12 A12 12 0 1 1 14 24" />
    <path d="M2 12 l0 -6 M2 12 l6 1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(236,20) scale(-1,1) translate(-24,0)" stroke="#B7B0A8" stroke-width="1.7" fill="none">
    <path d="M2 12 A12 12 0 1 1 14 24" />
    <path d="M2 12 l0 -6 M2 12 l6 1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- cloud trigger icon, highlighted -->
  <circle cx="646" cy="32" r="18" fill="#F1EAFF"/>
  <path d="M636 36 a8 8 0 0 1 2.8 -15.4 A10.4 10.4 0 0 1 660 24.4 a6.4 6.4 0 0 1 -1.6 12.5 Z" fill="none" stroke="#8B3DFF" stroke-width="1.8"/>

  <!-- popover shadow + card -->
  <rect x="392" y="92" width="278" height="216" rx="14" fill="#171412" opacity="0.10"/>
  <rect x="384" y="84" width="278" height="216" rx="14" fill="#FFFFFF" stroke="rgba(23,18,15,0.10)" stroke-width="1.5"/>

  <!-- header -->
  <text x="404" y="116" fill="#171412" font-size="14.5" font-weight="700">Promjene spremljene</text>
  <text x="642" y="116" fill="#171412" opacity="0.45" font-size="11.5" text-anchor="end">upravo sad</text>
  <line x1="384" y1="132" x2="662" y2="132" stroke="rgba(23,18,15,0.09)" stroke-width="1.25"/>

  <!-- offline icon -->
  <rect x="404" y="150" width="34" height="24" rx="5" fill="none" stroke="#8B3DFF" stroke-width="1.8"/>
  <path d="M421 174 v12 m0 0 l-6 -6 m6 6 l6 -6" stroke="#8B3DFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="452" y="163" fill="#171412" font-size="13.5" font-weight="700">Trebaš dizajnirati offline?</text>
  <text x="452" y="182" fill="#171412" opacity="0.62" font-size="11.5">Offline dizajni se spremaju na tvoj</text>
  <text x="452" y="197" fill="#171412" opacity="0.62" font-size="11.5">uređaj - vidljivi svima s pristupom.</text>

  <!-- button -->
  <rect x="404" y="230" width="238" height="40" rx="9" fill="#8B3DFF"/>
  <path d="M418 250 l5 5 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="530" y="255" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Učini dostupnim offline</text>

  <!-- accent pointer, generic (no mascot) -->
  <path d="M672 300 q18 6 22 26" fill="none" stroke="#FF8A3D" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="696" cy="330" r="5" fill="#FF8A3D"/>
</svg>