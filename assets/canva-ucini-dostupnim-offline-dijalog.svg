<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif" role="img" aria-label="Ilustracija: dijaloski okvir 'Ucini dostupnim offline' u Canvi, promjene su spremljene i dizajn se moze preuzeti za rad bez interneta">
  <rect x="0" y="0" width="640" height="300" rx="16" fill="#F4F1EC"/>
  <rect x="0.75" y="0.75" width="638.5" height="298.5" rx="15.25" fill="none" stroke="rgba(23,18,15,0.12)" stroke-width="1.5"/>

  <!-- shadow -->
  <rect x="130" y="42" width="384" height="220" rx="16" fill="#171412" opacity="0.08"/>
  <!-- card -->
  <rect x="122" y="34" width="384" height="220" rx="16" fill="#FFFFFF" stroke="rgba(23,18,15,0.12)" stroke-width="1.5"/>

  <!-- header -->
  <circle cx="150" cy="66" r="11" fill="#22A366"/>
  <path d="M145 66 l4 4 l8 -8" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="170" y="71" fill="#171412" font-size="15" font-weight="700">Promjene spremljene</text>
  <text x="506" y="71" fill="#171412" opacity="0.45" font-size="12" text-anchor="end">upravo sad</text>

  <line x1="122" y1="94" x2="506" y2="94" stroke="rgba(23,18,15,0.1)" stroke-width="1.5"/>

  <!-- cloud icon -->
  <g transform="translate(148,120)">
    <path d="M0 22 a14 14 0 0 1 3 -27.7 A18 18 0 0 1 37 5 a11 11 0 0 1 -3 21.9 Z" fill="#7C5CFC" opacity="0.15"/>
    <path d="M0 22 a14 14 0 0 1 3 -27.7 A18 18 0 0 1 37 5 a11 11 0 0 1 -3 21.9 Z" fill="none" stroke="#7C5CFC" stroke-width="2"/>
    <path d="M17 14 v16 m0 0 l-7 -7 m7 7 l7 -7" stroke="#7C5CFC" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="200" y="118" fill="#171412" font-size="14" font-weight="700">Trebaš ovaj dizajn i bez interneta?</text>
  <text x="200" y="140" fill="#171412" opacity="0.65" font-size="12.5">Postavke se spremaju na uređaj -</text>
  <text x="200" y="158" fill="#171412" opacity="0.65" font-size="12.5">vidljive svima koji imaju pristup uređaju.</text>

  <!-- button -->
  <rect x="148" y="196" width="236" height="38" rx="9" fill="#7C5CFC"/>
  <text x="266" y="220" fill="#FFFFFF" font-size="13.5" font-weight="600" text-anchor="middle">Učini dostupnim offline</text>
</svg>
