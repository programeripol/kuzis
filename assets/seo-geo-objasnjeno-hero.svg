<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="1600" height="900" fill="#FFC93C"/>

  <!-- scattered stars -->
  <g stroke="#171412" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M120 90 L132 118 L160 130 L132 142 L120 170 L108 142 L80 130 L108 118 Z" fill="#171412" opacity="0.85"/>
    <path d="M1480 760 L1487 778 L1505 785 L1487 792 L1480 810 L1473 792 L1455 785 L1473 778 Z" fill="#171412" opacity="0.85"/>
    <path d="M1420 130 L1426 145 L1441 151 L1426 157 L1420 172 L1414 157 L1399 151 L1414 145 Z" fill="#171412" opacity="0.7"/>
  </g>

  <!-- magnifying glass over search results / AI answer card -->
  <g transform="translate(770,110)">
    <rect x="0" y="0" width="420" height="300" rx="18" fill="#FFFFFF" stroke="#171412" stroke-width="6"/>
    <circle cx="70" cy="55" r="16" fill="#FFC93C" stroke="#171412" stroke-width="5"/>
    <line x1="100" y1="52" x2="370" y2="52" stroke="#171412" stroke-width="7" stroke-linecap="round"/>
    <line x1="30" y1="105" x2="390" y2="105" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <line x1="30" y1="135" x2="320" y2="135" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <rect x="26" y="160" width="368" height="60" rx="10" fill="#FFF3CF" stroke="#171412" stroke-width="3"/>
    <text x="42" y="185" font-size="16" font-weight="700" fill="#171412">&#8220;Citirano u AI odgovoru:&#8221;</text>
    <text x="42" y="208" font-size="14" font-weight="500" fill="#171412" opacity="0.75">tvoja stranica, tvoja brojka</text>
    <line x1="30" y1="252" x2="330" y2="252" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <!-- magnifying glass -->
    <g transform="translate(320,180)">
      <circle cx="0" cy="0" r="66" fill="rgba(255,255,255,0.15)" stroke="#171412" stroke-width="9"/>
      <line x1="47" y1="47" x2="105" y2="105" stroke="#171412" stroke-width="14" stroke-linecap="round"/>
    </g>
  </g>

  <!-- growing bar chart bottom right -->
  <g transform="translate(1230,560)">
    <rect x="0" y="140" width="46" height="90" rx="6" fill="#171412"/>
    <rect x="66" y="95" width="46" height="135" rx="6" fill="#171412"/>
    <rect x="132" y="45" width="46" height="185" rx="6" fill="#171412"/>
    <path d="M4 150 L70 100 L136 55 L200 10" stroke="#171412" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M172 10 L200 10 L200 38" stroke="#171412" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- pencil + notepad bottom left -->
  <g transform="translate(960,650)">
    <rect x="0" y="0" width="160" height="130" rx="10" fill="#FFFFFF" stroke="#171412" stroke-width="6"/>
    <line x1="22" y1="35" x2="138" y2="35" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="22" y1="65" x2="138" y2="65" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="22" y1="95" x2="95" y2="95" stroke="#171412" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <g transform="translate(140,-30) rotate(45)">
      <rect x="0" y="0" width="24" height="120" rx="6" fill="#FFFFFF" stroke="#171412" stroke-width="6"/>
      <polygon points="0,120 24,120 12,145" fill="#171412"/>
    </g>
  </g>

  <!-- speech bubble with question mark -->
  <g transform="translate(1000,470)">
    <path d="M0 40 Q0 0 40 0 L150 0 Q190 0 190 40 L190 70 Q190 110 150 110 L60 110 L25 140 L35 110 L40 110 Q0 110 0 70 Z" fill="#FFFFFF" stroke="#171412" stroke-width="6"/>
    <text x="95" y="72" font-size="56" font-weight="800" fill="#171412" text-anchor="middle">?</text>
  </g>

  <!-- headline text (literal H1, wrapped) -->
  <text x="80" y="300" font-size="50" font-weight="800" fill="#171412" letter-spacing="-1">Što je GEO i zašto</text>
  <text x="80" y="360" font-size="50" font-weight="800" fill="#171412" letter-spacing="-1">je važniji od</text>
  <text x="80" y="420" font-size="50" font-weight="800" fill="#171412" letter-spacing="-1">klasičnog SEO-a</text>
  <text x="80" y="480" font-size="50" font-weight="800" fill="#171412" letter-spacing="-1">u 2026.</text>

  <!-- 4 icon+label pairs for key terms -->
  <g font-size="20" font-weight="700" fill="#171412">
    <g transform="translate(80,560)">
      <circle cx="16" cy="16" r="16" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
      <path d="M9 20 L16 8 L23 20 M11.5 16 L20.5 16" stroke="#171412" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="22">ChatGPT</text>
    </g>
    <g transform="translate(80,605)">
      <circle cx="16" cy="16" r="16" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
      <circle cx="16" cy="16" r="6" fill="none" stroke="#171412" stroke-width="4"/>
      <line x1="24" y1="24" x2="30" y2="30" stroke="#171412" stroke-width="4" stroke-linecap="round"/>
      <text x="42" y="22">Perplexity</text>
    </g>
    <g transform="translate(80,650)">
      <circle cx="16" cy="16" r="16" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
      <path d="M8 22 L14 14 L18 18 L24 8" stroke="#171412" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="22">AI Overviews</text>
    </g>
    <g transform="translate(80,695)">
      <circle cx="16" cy="16" r="16" fill="#FFFFFF" stroke="#171412" stroke-width="4"/>
      <line x1="9" y1="12" x2="23" y2="12" stroke="#171412" stroke-width="4" stroke-linecap="round"/>
      <line x1="9" y1="17" x2="23" y2="17" stroke="#171412" stroke-width="4" stroke-linecap="round"/>
      <line x1="9" y1="22" x2="18" y2="22" stroke="#171412" stroke-width="4" stroke-linecap="round"/>
      <text x="42" y="22">Citiranje</text>
    </g>
  </g>

  <!-- Kužiš wordmark bottom-left -->
  <text x="80" y="850" font-size="34" font-weight="800" fill="#171412">Kužiš.</text>
</svg>
